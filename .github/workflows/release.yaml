name: release

on:
  push:
    branches:
      - "main"
      - "staging"
      - "feat/*"
      - "fix/*"
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  actions: read
  checks: write

env:
  REGISTRY_HOST: chainmind.azurecr.io
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  RELEASE_NAME: inner-circle-staging
  RELEASE_NAMESPACE: inner-circle-staging
  RELEASE_DOMAIN: staging.innercircle-chainmind.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint Helm
        uses: WyriHaximus/github-action-helm3@v3
        with:
          exec: helm lint .ci/chart
  build:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Declare short commit id
        id: vars
        shell: bash
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"

      - name: "Set IMG_NAME variable"
        run: echo 'IMG_NAME=${{ env.REGISTRY_HOST }}/frontiers/front' >>$GITHUB_ENV

      - name: "Set IMG_TAG variable"
        if: env.BRANCH_NAME == 'main' || env.BRANCH_NAME == 'staging'
        run: echo 'IMG_TAG=${{ env.BRANCH_NAME }}-${{ steps.vars.outputs.sha_short }}' >>$GITHUB_ENV

      - name: "Set IMG_TAG variable feature branch"
        if: env.BRANCH_NAME != 'staging' && env.BRANCH_NAME != 'main'
        run: |
          PREFIX_NAME_V1="${{ env.BRANCH_NAME }}"
          PREFIX_NAME="${PREFIX_NAME_V1//\//-}"
          echo "IMG_TAG=${PREFIX_NAME}-${{ steps.vars.outputs.sha_short }}" >>$GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: login to ${{ env.REGISTRY_HOST }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # Build for feature branches
      - name: Build and push
        if: env.BRANCH_NAME != 'staging' && env.BRANCH_NAME != 'main'
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            url=https://staging.innercircle-chainmind.com/
            minecraft_endpoint=https://feat-swaggo-minecraft.innercircle-chainmind.com/
            google_client_id=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            google_client_secret=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
            cms_endpoint=https://cms.innercircle-chainmind.com/
            intercom_secret=${{ secrets.STAGING_INTERCOM_SECRET }}
            public_env=STAGING
          tags: ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}

      - name: Build and push
        if: env.BRANCH_NAME == 'main'
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            url=https://innercircle-chainmind.com/
            minecraft_endpoint=https://minecraft.innercircle-chainmind.com/
            google_client_id=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            google_client_secret=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
            cms_endpoint=https://cms.innercircle-chainmind.com/
            intercom_secret=${{ secrets.PROD_INTERCOM_SECRET }}
            telegram_channel=${{ secrets.PROD_TELEGRAM_CHANNEL }}
            openai_api_key=${{ secrets.PROD_OPENAI_API_KEY }}
            public_env=PRODUCTION
          tags: ${{ env.IMG_NAME }}:${{ env.IMG_TAG }},${{ env.IMG_NAME }}:${{ env.BRANCH_NAME }}

      - name: Build and push
        if: env.BRANCH_NAME == 'staging'
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            url=https://staging.innercircle-chainmind.com/
            minecraft_endpoint=https://feat-swaggo-minecraft.innercircle-chainmind.com/
            google_client_id=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            google_client_secret=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
            cms_endpoint=https://cms.innercircle-chainmind.com/
            intercom_secret=${{ secrets.STAGING_INTERCOM_SECRET }}
            telegram_channel=${{ secrets.STAGING_TELEGRAM_CHANNEL }}
            openai_api_key=${{ secrets.STAGING_OPENAI_API_KEY }}
            public_env=STAGING
          tags: ${{ env.IMG_NAME }}:${{ env.IMG_TAG }},${{ env.IMG_NAME }}:${{ env.BRANCH_NAME }}

  release:
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "lts/*"
      
      - name: Setup Semantic Release
        run: npm install -g semantic-release @semantic-release/exec @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/git @semantic-release/github
      
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: npx semantic-release

  helm:
    needs: [build]
    runs-on: "ubuntu-latest"
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Lowecase the repo name
        run: |
          echo "REPOSITORY_NAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Declare short commit id
        id: vars
        shell: bash
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"

      - name: "Set IMG_NAME variable"
        run: echo 'IMG_NAME=${{ env.REGISTRY_HOST }}/frontiers/front' >>$GITHUB_ENV

      - name: "Set IMG_TAG variable"
        if: env.BRANCH_NAME == 'staging'
        run: |
          echo 'IMG_TAG=${{ env.BRANCH_NAME }}-${{ steps.vars.outputs.sha_short }}' >>$GITHUB_ENV

      # Feature branch IMG_TAG
      - name: "Set IMG_TAG variable feature branch"
        if: env.BRANCH_NAME != 'staging'
        run: |
          PREFIX_NAME_V1="${{ env.BRANCH_NAME }}"
          PREFIX_NAME="${PREFIX_NAME_V1//\//-}"
          echo "RELEASE_NAME=${PREFIX_NAME}" >>$GITHUB_ENV
          echo "RELEASE_DOMAIN=${PREFIX_NAME}-${{ env.RELEASE_DOMAIN }}" >>$GITHUB_ENV
          echo "IMG_TAG=${PREFIX_NAME}-${{ steps.vars.outputs.sha_short }}" >>$GITHUB_ENV

      - name: Run Helm and Deploy
        uses: WyriHaximus/github-action-helm3@v3
        with:
          exec: |
            helm upgrade --install \
              "inner-circle.${{ env.RELEASE_NAME }}" \
              --namespace ${{ env.RELEASE_NAMESPACE }} \
              --set name="${{ env.RELEASE_NAME }}" \
              --set replicaCount="1" \
              --set domainName="${{ env.RELEASE_DOMAIN }}" \
              --set image.repository="${{ env.IMG_NAME }}" \
              --set image.tag="${{ env.IMG_TAG }}" \
              --set tls.enabled="true" \
              --set tls.clusterIssuer="cloudflare" \
              --set tls.secretName="inner-circle-${{ env.RELEASE_NAME }}-net-tls" \
              --set resources.limits.cpu="500m" \
              --set resources.limits.memory="500Mi" \
              --set resources.requests.cpu="250m" \
              --set resources.requests.memory="256Mi" \
              --set app.auth_trust_host="true" \
              --set app.auth_secret="${{ secrets.STAGING_NEXTAUTH_SECRET }}" \
              --set app.google_client_id="${{ secrets.STAGING_GOOGLE_CLIENT_ID }}" \
              --set app.google_client_secret="${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}" \
              --create-namespace \
              --atomic \
              .ci/chart
          kubeconfig: "${{ secrets.KUBECONFIG }}"
