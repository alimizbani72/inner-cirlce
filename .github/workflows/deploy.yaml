name: deploy

on:
  push:
    branches:
      - "main"
      - "staging"

env:
  REGISTRY_HOST: chainmind.azurecr.io
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

  RELEASE_NAME: front

  STAGING_RELEASE_NAMESPACE: inner-circle-staging
  PROD_RELEASE_NAMESPACE: inner-circle-prod

  # Release domains
  PROD_RELEASE_DOMAIN: innercircle-chainmind.com
  STAGING_RELEASE_DOMAIN: staging.innercircle-chainmind.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint Helm
        uses: WyriHaximus/github-action-helm3@v3
        with:
          exec: helm lint .ci/chart
  build:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Declare short commit id
        id: vars
        shell: bash
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"

      - name: "Set IMG_NAME variable"
        run: echo 'IMG_NAME=${{ env.REGISTRY_HOST }}/frontiers/front' >>$GITHUB_ENV

      - name: "Set IMG_TAG variable"
        run: echo 'IMG_TAG=${{ env.BRANCH_NAME }}-${{ steps.vars.outputs.sha_short }}' >>$GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: login to ${{ env.REGISTRY_HOST }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        if: env.BRANCH_NAME == 'main'
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            minecraft_endpoint=https://minecraft.innercircle-chainmind.com/
            google_client_id=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            google_client_secret=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          tags: ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}

      - name: Build and push
        if: env.BRANCH_NAME == 'staging'
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            minecraft_endpoint=https://staging-minecraft.innercircle-chainmind.com/
            google_client_id=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            google_client_secret=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
          tags: ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}


  helm:
    needs: [build]
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: Lowecase the repo name
        run: |
          echo "REPOSITORY_NAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Declare short commit id
        id: vars
        shell: bash
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"

      - name: "Set IMG_NAME variable"
        run: echo 'IMG_NAME=${{ env.REGISTRY_HOST }}/frontiers/front' >>$GITHUB_ENV

      - name: "Set IMG_TAG variable"
        run: echo 'IMG_TAG=${{ env.BRANCH_NAME }}-${{ steps.vars.outputs.sha_short }}' >>$GITHUB_ENV

      - name: "Set RELEASE_NAME to STAGING_RELEASE_DOMAIN if branch is staging"
        if: env.BRANCH_NAME == 'staging'
        run: |
          echo 'RELEASE_DOMAIN=${{ env.STAGING_RELEASE_DOMAIN }}' >>$GITHUB_ENV
          echo 'RELEASE_NAMESPACE=${{ env.STAGING_RELEASE_NAMESPACE }}' >>$GITHUB_ENV

      - name: "Set RELEASE_NAME to PROD_RELEASE_DOMAIN if branch is main"
        if: env.BRANCH_NAME == 'main'
        run: |
          echo 'RELEASE_DOMAIN=${{ env.PROD_RELEASE_DOMAIN }}' >>$GITHUB_ENV
          echo 'RELEASE_NAMESPACE=${{ env.PROD_RELEASE_NAMESPACE }}' >>$GITHUB_ENV

      - name: Run Helm and Deploy
        uses: WyriHaximus/github-action-helm3@v3
        if: env.BRANCH_NAME == 'staging'
        with:
          exec: |
            helm upgrade --install \
              "${{ env.RELEASE_NAME }}.${{ env.BRANCH_NAME }}" \
              --namespace ${{ env.RELEASE_NAMESPACE }} \
              --set name="${{ env.RELEASE_NAME }}-staging" \
              --set replicaCount="3" \
              --set domainName="${{ env.RELEASE_DOMAIN }}" \
              --set image.repository="${{ env.IMG_NAME }}" \
              --set image.tag="${{ env.IMG_TAG }}" \
              --set tls.enabled="true" \
              --set tls.clusterIssuer="cloudflare" \
              --set tls.secretName="${{ env.BRANCH_NAME }}-${{ env.RELEASE_NAME }}-net-tls" \
              --set resources.limits.cpu="500m" \
              --set resources.limits.memory="500Mi" \
              --set resources.requests.cpu="250m" \
              --set resources.requests.memory="256Mi" \
              --set app.nextauth_url="https://${{ env.RELEASE_DOMAIN }}" \
              --set app.nextauth_secret="${{ secrets.STAGING_NEXTAUTH_SECRET }}" \
              --set app.google_client_id="${{ secrets.STAGING_GOOGLE_CLIENT_ID }}" \
              --set app.google_client_secret="${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}" \
              --create-namespace \
              --atomic \
              .ci/chart
          kubeconfig: "${{ secrets.KUBECONFIG }}"

      - name: Run Helm and Deploy
        uses: WyriHaximus/github-action-helm3@v3
        if: env.BRANCH_NAME == 'main'
        with:
          exec: |
            helm upgrade --install \
              "${{ env.RELEASE_NAME }}.${{ env.BRANCH_NAME }}" \
              --namespace ${{ env.RELEASE_NAMESPACE }} \
              --set name="${{ env.RELEASE_NAME }}-prod" \
              --set replicaCount="3" \
              --set domainName="${{ env.RELEASE_DOMAIN }}" \
              --set image.repository="${{ env.IMG_NAME }}" \
              --set image.tag="${{ env.IMG_TAG }}" \
              --set tls.enabled="true" \
              --set tls.clusterIssuer="cloudflare" \
              --set tls.secretName="${{ env.BRANCH_NAME }}-${{ env.RELEASE_NAME }}-net-tls" \
              --set resources.limits.cpu="500m" \
              --set resources.limits.memory="500Mi" \
              --set resources.requests.cpu="250m" \
              --set resources.requests.memory="256Mi" \
              --set app.nextauth_url="https://${{ env.RELEASE_DOMAIN }}" \
              --set app.nextauth_secret="${{ secrets.PROD_NEXTAUTH_SECRET }}" \
              --set app.google_client_id="${{ secrets.PROD_GOOGLE_CLIENT_ID }}" \
              --set app.google_client_secret="${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
              --create-namespace \
              --atomic \
              .ci/chart
          kubeconfig: "${{ secrets.KUBECONFIG }}"

