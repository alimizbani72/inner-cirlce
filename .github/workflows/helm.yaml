name: deploy

on:
  workflow_dispatch:
    tags: ['v[0-9].[0-9]+.[0-9]+']

env:
  REGISTRY_HOST: chainmind.azurecr.io
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  RELEASE_NAME: inner-circle
  RELEASE_NAMESPACE: inner-circle
  RELEASE_DOMAIN: innercircle-chainmind.com

jobs:
  helm:
    runs-on: "ubuntu-latest"
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "true"

      - name: "Set image name variable"
        run: echo 'IMG_NAME=${{ env.REGISTRY_HOST }}/frontiers/front' >>$GITHUB_ENV

      - name: Set image tag variable
        run: echo 'IMG_TAG=${{ env.BRANCH_NAME }}' >>$GITHUB_ENV

      - name: login to ${{ env.REGISTRY_HOST }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: "Tag latest image to current tag"
        run: |
          export SOURCE_IMAGE=${{ env.IMG_NAME }}:main
          docker pull $SOURCE_IMAGE
          docker tag $SOURCE_IMAGE ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}
          docker tag $SOURCE_IMAGE ${{ env.IMG_NAME }}:latest
          docker push ${{ env.IMG_NAME }}:${{ env.IMG_TAG }}
          docker push ${{ env.IMG_NAME }}:latest

      - name: Pack the helm
        run: |
          cd .ci/chart
          export escaped_version=$(printf '%s\n' "${{ env.IMG_TAG }}" | sed -e 's/[\/.]/\\./g')
          sed -i "s/^appVersion:.*$/appVersion: ${escaped_version}/" Chart.yaml
          sed -i "s/^version:.*$/version: ${escaped_version}/" Chart.yaml
          helm registry login ${{ env.REGISTRY_HOST }} \
            --username ${{ secrets.REGISTRY_USER }} \
            --password ${{ secrets.REGISTRY_TOKEN }}
          helm package . --app-version ${{ env.IMG_TAG }}
          helm push chainmind-web-${{ env.IMG_TAG }}.tgz oci://${{ env.REGISTRY_HOST }}/helm

      - name: Run Helm and Deploy
        uses: WyriHaximus/github-action-helm3@v3
        with:
          exec: |
            helm upgrade --install \
              "${{ env.RELEASE_NAME }}.main" \
              --namespace ${{ env.RELEASE_NAMESPACE }} \
              --set name="${{ env.RELEASE_NAME }}-prod" \
              --set replicaCount="10" \
              --set domainName="${{ env.RELEASE_DOMAIN }}" \
              --set image.repository="${{ env.IMG_NAME }}" \
              --set image.tag="${{ env.IMG_TAG }}" \
              --set tls.enabled="true" \
              --set tls.clusterIssuer="cloudflare" \
              --set tls.secretName="${{ env.BRANCH_NAME }}-${{ env.RELEASE_NAME }}-net-tls" \
              --set resources.limits.cpu="500m" \
              --set resources.limits.memory="500Mi" \
              --set resources.requests.cpu="250m" \
              --set resources.requests.memory="256Mi" \
              --set app.nextauth_url="https://${{ env.RELEASE_DOMAIN }}" \
              --set app.nextauth_secret="${{ secrets.PROD_NEXTAUTH_SECRET }}" \
              --set app.google_client_id="${{ secrets.PROD_GOOGLE_CLIENT_ID }}" \
              --set app.google_client_secret="${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
              --atomic \
              oci://${{ env.REGISTRY_HOST }}/helm/chainmind-web:${{ env.IMG_TAG }}
          kubeconfig: "${{ secrets.PROD_INNER_CIRCLE_KUBECONFIG }}"
