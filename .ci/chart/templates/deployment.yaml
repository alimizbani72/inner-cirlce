apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
    group: web
spec:
  selector:
    matchLabels:
      app: {{ .Values.name }}
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        releaseTime: {{ dateInZone "2006-01-02 15:04:05Z" (now) "UTC"| quote }}
      labels:
        app: {{ .Values.name }}
    spec:
      imagePullSecrets:
      - name: harbor
      - name: azurecr
      containers:
      - name: main
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 3001
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: NEXTAUTH_URL
          value: {{ .Values.app.nextauth_url }}
        - name: NEXTAUTH_SECRET
          value: {{ .Values.app.nextauth_secret }}
        - name: GOOGLE_CLIENT_ID
          value: {{ .Values.app.google_client_id }}
        - name: GOOGLE_CLIENT_SECRET
          value: {{ .Values.app.google_client_secret }}
      {{- if $.Values.securityContext }}
      securityContext:
        {{- $.Values.securityContext | nindent 8 }}
      {{- end }}
      {{- if $.Values.tolerations }}
      tolerations:
        {{- toYaml $.Values.tolerations | nindent 8 }}
      {{- end }}
