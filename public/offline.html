<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #070720;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            height: 90dvh;
            padding: 15px;
            margin: 0;
        }

        h2 {
            color: white;
            font-weight: bold;
            font-size: 40px;
            margin-bottom: 5px;
            letter-spacing: 1.5px;
            text-align: center;
        }

        p {
            color: white;
            font-size: 16px;
            margin-bottom: 60px;
            text-align: center;
        }

        button {
            outline: none;
            border: none;
            font-size: 16px;
            height: 36px;
            max-width: 200px;
            width: 100%;
            margin-bottom: 30px;
            text-align: center;
            color: #14162E;
            padding: 8px 30px;
            border-radius: 24px;
            background-color: white;
            box-shadow: 0px 4px 8px 0px rgba(0, 0, 0, 0.24);
            cursor: pointer;
        }
    </style>
    <title>Offline</title>
</head>
<body>
    <h2>OFFLINE</h2>
    <p>Please check your internet connection</p>

    <button onclick="window.location.reload()">Retry</button>
</body>
</html>
